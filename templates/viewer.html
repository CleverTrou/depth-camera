<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>{{ event_id }} — Depth Camera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
/* ── Design system tokens ────────────────────────────────────────────────── */
:root {
  --accent-h: 200;
  --accent-c: 0.13;
  --accent-l: 0.78;
  --accent:      oklch(var(--accent-l) var(--accent-c) var(--accent-h));
  --accent-dim:  oklch(0.55 var(--accent-c) var(--accent-h));
  --accent-bg:   oklch(0.30 0.05 var(--accent-h));
  --font-ui:      "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --font-display: var(--font-ui);
  --radius: 10px;
  --bg:        oklch(0.16 0.004 250);
  --bg-1:      oklch(0.20 0.004 250);
  --bg-2:      oklch(0.24 0.005 250);
  --line:      oklch(0.30 0.005 250);
  --line-soft: oklch(0.25 0.005 250);
  --fg:        oklch(0.96 0.005 250);
  --fg-mid:    oklch(0.72 0.008 250);
  --fg-dim:    oklch(0.52 0.008 250);
  --fg-faint:  oklch(0.38 0.008 250);
  color-scheme: dark;
}
[data-aesthetic="instrument"] { --font-display: var(--font-mono); --radius: 4px; }
[data-aesthetic="cinematic"]  { --font-display: "Fraunces", Georgia, serif; --radius: 16px; }
[data-aesthetic="brutalist"]  { --font-display: "Inter Tight", system-ui, sans-serif; --radius: 0px; --line: oklch(0.96 0.005 250); }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: var(--bg); color: var(--fg);
  font-family: var(--font-ui);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  overflow: hidden; height: 100%;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
.mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.chip {
  display: inline-flex; align-items: center;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 3px 7px; border-radius: 3px;
  background: var(--bg-2); color: var(--fg-mid);
  border: 1px solid var(--line-soft); white-space: nowrap;
}
.chip[data-type="person"]    { color: oklch(0.82 0.13 145); border-color: oklch(0.4 0.08 145); }
.chip[data-type="animal"]    { color: oklch(0.82 0.14 75);  border-color: oklch(0.4 0.08 75); }
.chip[data-type="package"]   { color: oklch(0.78 0.13 305); border-color: oklch(0.4 0.08 305); }
.chip[data-type="vehicle"]   { color: oklch(0.82 0.13 230); border-color: oklch(0.4 0.08 230); }
.chip[data-type="lingering"] { color: oklch(0.78 0.14 25);  border-color: oklch(0.4 0.08 25); }
.chip[data-type="motion"]    { color: oklch(0.78 0.08 260); border-color: oklch(0.4 0.06 260); }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; line-height: 1;
  background: var(--bg-1); color: var(--fg);
  border: 1px solid var(--line);
  transition: background 120ms, border-color 120ms, color 120ms;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn--primary { background: var(--accent); color: oklch(0.15 0.02 var(--accent-h)); border-color: var(--accent); font-weight: 600; }
.btn--primary:hover { background: oklch(calc(var(--accent-l) + 0.04) var(--accent-c) var(--accent-h)); }
.btn--primary:disabled { opacity: 0.4; cursor: default; }
.btn--ghost  { background: transparent; border-color: var(--line-soft); color: var(--fg-mid); }
.btn--ghost:hover { color: var(--accent); border-color: var(--accent); }
.dot-live {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: oklch(0.78 0.18 145);
  animation: pulse 2.4s cubic-bezier(0.4,0,0.6,1) infinite;
  display: inline-block;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 oklch(0.78 0.18 145 / 0.6); }
  50%       { box-shadow: 0 0 0 6px oklch(0.78 0.18 145 / 0); }
}
</style>
<style>
/* ── Viewer layout ───────────────────────────────────────────────────────── */
.viewer {
  position: fixed; inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  background: var(--bg);
}

/* Header */
.vhdr {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 12px 20px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-1); z-index: 4;
}
.vhdr__left   { display: flex; align-items: center; gap: 14px; min-width: 0; overflow: hidden; }
.vhdr__back   {
  width: 36px; height: 36px; display: grid; place-items: center;
  border: 1px solid var(--line); border-radius: var(--radius);
  font-size: 18px; color: var(--fg-mid); flex-shrink: 0;
  transition: color 120ms, border-color 120ms;
}
.vhdr__back:hover { color: var(--accent); border-color: var(--accent); }
.vhdr__id   { font-family: var(--font-mono); font-size: 13px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vhdr__meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.vhdr__time, .vhdr__src { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); }

/* Stage */
.viewer__stage {
  position: relative;
  background: oklch(0.10 0.005 250);
  overflow: hidden;
}
#js-stage { position: absolute; inset: 0; overflow: hidden; }

/* Corner labels in stage */
.stage-corner {
  position: absolute;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.65); background: rgba(0,0,0,0.5);
  padding: 5px 10px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 6px;
  z-index: 2; pointer-events: none;
}
.stage-corner--tl { top: 14px; left: 14px; }
.stage-corner--br { bottom: 14px; right: 14px; }

/* Depth slider */
.dslider { position: absolute; inset: 0; cursor: ew-resize; user-select: none; background: oklch(0.10 0.005 250); }
.dslider__layer { position: absolute; inset: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.dslider__layer img { width: 100%; height: 100%; object-fit: contain; display: block; }
.dslider__handle { position: absolute; top: 0; bottom: 0; pointer-events: none; z-index: 3; }
.dslider__bar  { position: absolute; top: 0; bottom: 0; left: -1px; width: 2px; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
.dslider__knob {
  position: absolute; top: 50%; left: 0; transform: translate(-50%, -50%);
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg-1); border: 1px solid var(--accent);
  display: grid; grid-template-columns: 1fr 1fr; place-items: center;
  color: var(--accent); font-family: var(--font-mono); font-size: 14px;
  box-shadow: 0 0 0 4px rgba(0,0,0,0.25);
}
.dslider__tag {
  position: absolute; top: 14px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;
  background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
  padding: 4px 8px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.12); z-index: 2;
}
.dslider__tag--l { left: 14px; }
.dslider__tag--r { right: 14px; }

/* XR layout */
.xr-wrap { position: absolute; inset: 0; display: grid; place-items: center; padding: 40px; overflow-y: auto; }
.xr {
  display: grid; grid-template-columns: 1.4fr auto; gap: 48px;
  max-width: 1000px; width: 100%; align-items: start;
}
@media (max-width: 760px) { .xr { grid-template-columns: 1fr; gap: 28px; } }
.xr__glyph  { color: var(--accent); margin-bottom: 4px; }
.xr__title  { font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px; }
[data-aesthetic="cinematic"] .xr__title { font-size: 40px; font-weight: 400; }
[data-aesthetic="brutalist"]  .xr__title { text-transform: uppercase; font-weight: 800; letter-spacing: 0; }
.xr__sub    { font-size: 15px; color: var(--fg-mid); line-height: 1.55; max-width: 50ch; margin-bottom: 20px; }
.xr__btns   { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.xr__support { display: flex; gap: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim); padding-top: 16px; border-top: 1px solid var(--line-soft); }
.xr__qr     { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
.xr__qrbox  { width: 180px; height: 180px; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; }
.xr__qrsvg  { width: 100%; height: 100%; }
.xr__url    { font-family: var(--font-mono); font-size: 10px; color: var(--fg-faint); max-width: 180px; word-break: break-all; text-align: center; }
.label-xs   { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); margin-bottom: 6px; }

/* Stage info / loading */
.stage-msg {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 13px; color: var(--fg-mid);
  text-align: center; line-height: 1.6;
}

/* Dock */
.dock {
  position: relative; display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-top: 1px solid var(--line-soft); background: var(--bg-1); z-index: 4;
}
.dock__pills {
  display: flex; gap: 4px;
  padding: 3px; border: 1px solid var(--line);
  border-radius: calc(var(--radius) + 4px); background: var(--bg);
}
.dock__pill {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  padding: 7px 13px; border-radius: var(--radius);
  color: var(--fg-mid); min-width: 80px;
  transition: background 120ms, color 120ms;
}
.dock__pill:hover { color: var(--fg); }
.dock__pill--on   { background: var(--accent-bg); color: var(--accent); }
.dock__pill-label { font-size: 13px; font-weight: 600; line-height: 1; }
.dock__pill-hint  { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; letter-spacing: 0.04em; }
.dock__actions    { display: flex; gap: 8px; margin-left: auto; }

/* Auto-XR nudge banner */
.dock__auto {
  position: absolute; top: -58px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg-1);
  border: 1px solid var(--accent); border-radius: calc(var(--radius) + 2px);
  font-size: 12px; color: var(--fg); white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  animation: nudge 240ms ease-out;
}
@keyframes nudge {
  from { opacity: 0; transform: translate(-50%, 8px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* HUD (cloud mode point info) */
.hud {
  position: absolute; bottom: 14px; left: 14px; z-index: 2; pointer-events: none;
  font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.06em; line-height: 1.6;
  transition: opacity 600ms;
}
.hud.hidden { opacity: 0; }

@media (max-width: 640px) {
  .dock { flex-wrap: wrap; }
  .dock__pills { width: 100%; overflow-x: auto; }
  .dock__pill { min-width: 64px; padding: 5px 10px; }
  .dock__pill-hint { display: none; }
  .dock__actions { margin-left: 0; }
  .vhdr__id { font-size: 11px; }
}
</style>

<!-- Three.js importmap — loaded lazily only when Cloud mode is activated -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<body data-aesthetic="instrument" data-mode="dark">
<div class="viewer">

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="vhdr">
    <div class="vhdr__left">
      <a href="/" class="vhdr__back" title="Back to gallery">&#x2039;</a>
      <div style="min-width:0">
        <div class="vhdr__id mono">{{ event_id }}</div>
        <div class="vhdr__meta">
          {% if event.event_type %}<span class="chip" data-type="{{ event.event_type }}">{{ event.event_type }}</span>{% endif %}
          {% if event.timestamp %}<span class="vhdr__time">{{ event.timestamp[:16].replace('T', ' ') }}</span>{% endif %}
          {% if event.source %}<span class="vhdr__src">via {{ event.source }}</span>{% endif %}
        </div>
      </div>
    </div>
  </header>

  <!-- ── Stage (modes render here) ─────────────────────────────────────────── -->
  <div class="viewer__stage">
    <div id="js-stage"></div>
  </div>

  <!-- ── Dock ──────────────────────────────────────────────────────────────── -->
  <div class="dock" id="js-dock">
    <div class="dock__pills">
      <button class="dock__pill" data-mode="parallax">
        <span class="dock__pill-label">Parallax</span>
        <span class="dock__pill-hint">tilt · drag · gyro</span>
      </button>
      <button class="dock__pill" data-mode="depth">
        <span class="dock__pill-label">Depth</span>
        <span class="dock__pill-hint">rgb ↔ depth</span>
      </button>
      <button class="dock__pill" data-mode="cloud">
        <span class="dock__pill-label">Cloud</span>
        <span class="dock__pill-hint">point cloud</span>
      </button>
      <button class="dock__pill" data-mode="xr">
        <span class="dock__pill-label">XR</span>
        <span class="dock__pill-hint">vr · ar</span>
      </button>
    </div>
    <div class="dock__actions">
      <a href="/" class="btn btn--ghost">&#x2039; Gallery</a>
      {% if event.has_ply %}<a href="/events/{{ event_id }}/pointcloud.ply" class="btn" download="{{ event_id }}.ply">PLY</a>{% endif %}
    </div>
    <!-- XR auto-detect banner inserted by JS -->
  </div>

</div><!-- .viewer -->

<script>
window.VIEWER_EVENT = {{ event | tojson }};
</script>
<script type="module">
'use strict';

const ev    = window.VIEWER_EVENT;
const stage = document.getElementById('js-stage');
const dock  = document.getElementById('js-dock');

// ── State ─────────────────────────────────────────────────────────────────
const _VALID_MODES = new Set(['parallax', 'depth', 'cloud', 'xr']);
const _savedMode = localStorage.getItem('viewer-mode');
let mode    = (_savedMode && _VALID_MODES.has(_savedMode)) ? _savedMode : 'parallax';
let cleanup = null;   // current mode cleanup fn
let xrBanner = null;  // auto-XR banner element

// ── Dock interaction ──────────────────────────────────────────────────────
function updateDock() {
  dock.querySelectorAll('[data-mode]').forEach(function(btn) {
    btn.classList.toggle('dock__pill--on', btn.dataset.mode === mode);
  });
}

dock.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-mode]');
  if (btn) switchMode(btn.dataset.mode);
});

// ── Mode switching ────────────────────────────────────────────────────────
function switchMode(newMode) {
  if (newMode === mode && cleanup) return;  // already mounted
  if (cleanup) { try { cleanup(); } catch(_) {} cleanup = null; }
  stage.innerHTML = '';
  mode = newMode;
  localStorage.setItem('viewer-mode', mode);
  updateDock();
  const mounter = { parallax: mountParallax, depth: mountDepth, cloud: mountCloud, xr: mountXr }[mode];
  if (mounter) mounter().then(function(fn) { cleanup = fn || null; });
}

// ── Auto-XR detection ────────────────────────────────────────────────────
if (navigator.xr) {
  const ua = navigator.userAgent || '';
  const likelyHeadset = /OculusBrowser|Quest|Pico|VisionOS|Wolvic/i.test(ua);
  const check = likelyHeadset
    ? Promise.resolve(true)
    : navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
  check.then(function(ok) {
    if (!ok || mode === 'xr') return;
    xrBanner = document.createElement('div');
    xrBanner.className = 'dock__auto mono';
    xrBanner.innerHTML =
      'XR headset detected &mdash; ' +
      '<button class="btn btn--primary" id="js-xr-enter" style="padding:5px 10px;font-size:12px">Enter</button>' +
      '<button class="btn btn--ghost" id="js-xr-dismiss" style="padding:5px 10px;font-size:12px">Dismiss</button>';
    dock.appendChild(xrBanner);
    xrBanner.querySelector('#js-xr-enter').onclick    = function() { dismissBanner(); switchMode('xr'); };
    xrBanner.querySelector('#js-xr-dismiss').onclick  = dismissBanner;
  });
}
function dismissBanner() { if (xrBanner) { xrBanner.remove(); xrBanner = null; } }

// ── Helpers ───────────────────────────────────────────────────────────────
function mkCorner(pos, html) {
  const el = document.createElement('div');
  el.className = 'stage-corner stage-corner--' + pos;
  el.innerHTML = html;
  return el;
}

// ── Mode: Parallax (WebGL depth-displacement) ─────────────────────────────
async function mountParallax() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block';
  stage.appendChild(canvas);

  const tl = mkCorner('tl', '<span class="dot-live"></span><span id="js-par-mode">PARALLAX</span>');
  const br = mkCorner('br', 'MOUSE · TOUCH · GYRO');
  stage.appendChild(tl);
  stage.appendChild(br);
  const modeLabel = tl.querySelector('#js-par-mode');

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) {
    stage.innerHTML = '<div class="stage-msg mono">WebGL not available</div>';
    return null;
  }

  // Shaders
  const vs = `attribute vec2 a_pos;attribute vec2 a_uv;varying vec2 v_uv;
    void main(){gl_Position=vec4(a_pos,0.,1.);v_uv=a_uv;}`;
  const fs = `precision mediump float;uniform sampler2D u_rgb;uniform sampler2D u_depth;
    uniform vec2 u_offset;uniform float u_strength;varying vec2 v_uv;
    void main(){float d=texture2D(u_depth,v_uv).r;
      float d2=d*d;
      vec2 disp=u_offset*d2*u_strength;
      disp=clamp(disp,v_uv-1.,v_uv);
      gl_FragColor=texture2D(u_rgb,v_uv-disp);}`;

  function compile(src, type) { const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(vs, gl.VERTEX_SHADER));
  gl.attachShader(prog, compile(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(prog); gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(16), gl.DYNAMIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,16,0);
  const aUV = gl.getAttribLocation(prog,'a_uv');
  gl.enableVertexAttribArray(aUV); gl.vertexAttribPointer(aUV,2,gl.FLOAT,false,16,8);
  const uOffset   = gl.getUniformLocation(prog,'u_offset');
  const uStrength = gl.getUniformLocation(prog,'u_strength');
  gl.uniform1i(gl.getUniformLocation(prog,'u_rgb'), 0);
  gl.uniform1i(gl.getUniformLocation(prog,'u_depth'), 1);
  gl.uniform1f(uStrength, 0.04);

  let aspect = 16/9;
  function updateQuad() {
    const sa = canvas.width / canvas.height;
    let sx, sy;
    if (sa > aspect) { sy=1; sx=aspect/sa; } else { sx=1; sy=sa/aspect; }
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      -sx,-sy, 0,1,  sx,-sy, 1,1,  -sx,sy, 0,0,  sx,sy, 1,0
    ]), gl.DYNAMIC_DRAW);
  }

  const loadOverlay = document.createElement('div');
  loadOverlay.className = 'stage-msg mono';
  loadOverlay.textContent = 'Loading…';
  stage.appendChild(loadOverlay);

  let loaded = 0;
  let raf;
  function tryStart() {
    if (loaded >= 2 && canvas.parentElement) {
      loadOverlay.remove();
      updateQuad();
      render();
    }
  }

  function loadTex(unit, url, onImg) {
    const tex = gl.createTexture();
    const img = new Image();
    img.crossOrigin = '';
    img.onload = function() {
      if (onImg) onImg(img);
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      loaded++; tryStart();
    };
    img.onerror = function() {
      // Synthesise placeholder texture
      const c = document.createElement('canvas'); c.width=256; c.height=144;
      const ctx = c.getContext('2d');
      if (unit === 0) {
        ctx.fillStyle='#111'; ctx.fillRect(0,0,256,144);
        ctx.fillStyle='#555'; ctx.font='12px monospace'; ctx.fillText('snapshot.jpg',60,75);
      } else {
        const g = ctx.createLinearGradient(0,0,256,0);
        g.addColorStop(0,'#1a0a3a'); g.addColorStop(0.4,'#a02060');
        g.addColorStop(0.7,'#f08020'); g.addColorStop(1,'#fff8c0');
        ctx.fillStyle=g; ctx.fillRect(0,0,256,144);
      }
      if (onImg) onImg({ naturalWidth:256, naturalHeight:144 });
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,c);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      loaded++; tryStart();
    };
    img.src = url;
  }

  loadTex(0, '/events/'+ev.event_id+'/snapshot.jpg', function(img) {
    aspect = (img.naturalWidth / img.naturalHeight) || aspect;
  });
  loadTex(1, '/events/'+ev.event_id+'/depth_colormap.jpg');

  function resize() {
    const dpr = Math.min(2, window.devicePixelRatio||1);
    const r = canvas.getBoundingClientRect();
    canvas.width  = r.width  * dpr;
    canvas.height = r.height * dpr;
    gl.viewport(0,0,canvas.width,canvas.height);
    if (loaded >= 2) updateQuad();
  }
  const ro = new ResizeObserver(resize); ro.observe(canvas); resize();

  let tX=0, tY=0, oX=0, oY=0, gyroOn=false;

  function render() {
    const lerp = gyroOn ? 0.12 : 0.08;
    oX += (tX-oX)*lerp; oY += (tY-oY)*lerp;
    gl.uniform2f(uOffset, oX, oY);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    raf = requestAnimationFrame(render);
  }

  function onMouse(e) {
    if (gyroOn) return;
    const r = canvas.getBoundingClientRect();
    tX = ((e.clientX-r.left)/r.width - 0.5)*2;
    tY = ((e.clientY-r.top)/r.height - 0.5)*2;
    modeLabel.textContent = 'PARALLAX · mouse';
  }
  function onLeave() { if (!gyroOn) { tX=0; tY=0; } }
  function onTouch(e) {
    if (gyroOn) return;
    e.preventDefault();
    const t=e.touches[0]; if(!t) return;
    const r=canvas.getBoundingClientRect();
    tX=((t.clientX-r.left)/r.width-0.5)*2;
    tY=((t.clientY-r.top)/r.height-0.5)*2;
    modeLabel.textContent = 'PARALLAX · touch';
  }
  function onOrient(e) {
    if (e.gamma==null && e.beta==null) return;
    gyroOn = true;
    modeLabel.textContent = 'PARALLAX · gyro';
    tX = Math.max(-1,Math.min(1,(e.gamma||0)/25));
    tY = Math.max(-1,Math.min(1,((e.beta||0)-45)/25));
  }
  canvas.addEventListener('mousemove', onMouse);
  canvas.addEventListener('mouseleave', onLeave);
  canvas.addEventListener('touchstart', onTouch, {passive:false});
  canvas.addEventListener('touchmove',  onTouch, {passive:false});

  // Gyro: Android fires freely; iOS 13+ needs requestPermission on user gesture.
  // Show the tap prompt regardless of protocol — iOS decides whether to grant.
  // On HTTP it may deny, but not showing the prompt at all is worse.
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile && typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      const gyroPrompt = document.createElement('button');
      gyroPrompt.className = 'stage-msg';
      gyroPrompt.style.cssText = 'pointer-events:auto;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:20px 32px;cursor:pointer;font-family:var(--font-mono);font-size:13px;color:#fff;line-height:1.5;text-align:center;';
      gyroPrompt.textContent = 'Tap to enable gyroscope';
      stage.appendChild(gyroPrompt);
      gyroPrompt.onclick = function() {
        DeviceOrientationEvent.requestPermission().then(function(r) {
          gyroPrompt.remove();
          if (r === 'granted') {
            window.addEventListener('deviceorientation', onOrient);
          } else {
            modeLabel.textContent = 'PARALLAX · gyro denied';
          }
        }).catch(function(err) {
          gyroPrompt.remove();
          // Likely HTTP — iOS blocks permission on non-secure origins
          modeLabel.textContent = 'PARALLAX · HTTPS needed for gyro';
        });
      };
    } else {
      // Android / older iOS — fires without permission
      window.addEventListener('deviceorientation', onOrient);
    }
  }

  return function() {
    cancelAnimationFrame(raf);
    ro.disconnect();
    canvas.removeEventListener('mousemove', onMouse);
    canvas.removeEventListener('mouseleave', onLeave);
    canvas.removeEventListener('touchstart', onTouch);
    canvas.removeEventListener('touchmove',  onTouch);
    window.removeEventListener('deviceorientation', onOrient);
  };
}

// ── Mode: Depth slider ────────────────────────────────────────────────────
async function mountDepth() {
  let pos = 50, dragging = false;

  stage.innerHTML = `
    <div class="dslider" id="js-dslider">
      <div class="dslider__layer">
        <img src="/events/${ev.event_id}/snapshot.jpg" alt="rgb" draggable="false">
      </div>
      <div class="dslider__layer" id="js-dlayer-depth" style="clip-path:inset(0 0 0 50%)">
        <img src="/events/${ev.event_id}/depth_colormap.jpg" alt="depth" draggable="false">
      </div>
      <div class="dslider__handle" id="js-dhandle" style="left:50%">
        <div class="dslider__bar"></div>
        <div class="dslider__knob">&#x2039;&#x203a;</div>
      </div>
      <div class="dslider__tag dslider__tag--l mono">RGB</div>
      <div class="dslider__tag dslider__tag--r mono">DEPTH</div>
    </div>`;

  const wrap   = stage.querySelector('#js-dslider');
  const depth  = stage.querySelector('#js-dlayer-depth');
  const handle = stage.querySelector('#js-dhandle');

  const tl = mkCorner('tl', '<span class="dot-live"></span><span id="js-ds-pct">DEPTH SLIDER · 50%</span>');
  stage.appendChild(tl);
  const pctLabel = tl.querySelector('#js-ds-pct');

  function setPos(p) {
    pos = Math.max(0, Math.min(100, p));
    depth.style.clipPath  = `inset(0 0 0 ${pos}%)`;
    handle.style.left     = pos + '%';
    pctLabel.textContent  = `DEPTH SLIDER · ${Math.round(pos)}%`;
  }

  function pxToPos(clientX) {
    const r = wrap.getBoundingClientRect();
    return ((clientX - r.left) / r.width) * 100;
  }

  function onDown(e) { dragging = true; setPos(pxToPos(e.clientX ?? e.touches?.[0]?.clientX)); }
  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    setPos(pxToPos(e.clientX ?? e.touches?.[0]?.clientX));
  }
  function onUp() { dragging = false; }
  function onKey(e) {
    const step = e.shiftKey ? 10 : 1;
    if (e.key==='ArrowLeft')  { setPos(pos - step); e.preventDefault(); }
    if (e.key==='ArrowRight') { setPos(pos + step); e.preventDefault(); }
  }

  wrap.addEventListener('mousedown', onDown);
  wrap.addEventListener('touchstart', onDown, {passive:true});
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
  window.addEventListener('touchmove', onMove, {passive:false});
  window.addEventListener('touchend',  onUp);
  window.addEventListener('keydown',   onKey);

  return function() {
    wrap.removeEventListener('mousedown', onDown);
    wrap.removeEventListener('touchstart', onDown);
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup',   onUp);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend',  onUp);
    window.removeEventListener('keydown',   onKey);
  };
}

// ── Mode: Point cloud (Three.js + PLYLoader, lazy-loaded) ─────────────────
async function mountCloud() {
  if (!ev.has_ply) {
    stage.innerHTML = '<div class="stage-msg mono">No point cloud for this event<br><span style="color:var(--fg-faint);font-size:11px">depth pipeline did not produce a .ply file</span></div>';
    return null;
  }

  stage.innerHTML = '<div class="stage-msg mono">Loading point cloud&#x2026;</div>';

  let T, PLYLoader, OrbitControls;
  try {
    const [tMod, plyMod, ocMod] = await Promise.all([
      import('three'),
      import('three/addons/loaders/PLYLoader.js'),
      import('three/addons/controls/OrbitControls.js'),
    ]);
    T             = tMod;
    PLYLoader     = plyMod.PLYLoader;
    OrbitControls = ocMod.OrbitControls;
  } catch(e) {
    const msg = document.createElement('div');
    msg.className = 'stage-msg mono';
    msg.textContent = 'Could not load Three.js (offline?) – ' + e.message;
    stage.appendChild(msg);
    return null;
  }

  stage.innerHTML = '';

  const renderer = new T.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(2, devicePixelRatio));
  renderer.setClearColor(0x0a0a10, 1);
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  renderer.domElement.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
  stage.appendChild(renderer.domElement);

  const scene  = new T.Scene();
  const camera = new T.PerspectiveCamera(60, stage.clientWidth / stage.clientHeight, 0.01, 500);
  camera.position.set(0, 0, 3);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  const tl  = mkCorner('tl', '<span class="dot-live"></span>POINT CLOUD · orbit');
  const hud = document.createElement('div');
  hud.className = 'hud mono';
  hud.textContent = 'Loading…';
  stage.appendChild(tl);
  stage.appendChild(hud);

  // Load PLY
  const loader = new PLYLoader();
  loader.load(
    '/events/' + ev.event_id + '/pointcloud.ply',
    function(geometry) {
      // PLY uses image coords (Y-down, Z-positive=far). Flip to Three.js (Y-up, Z-negative=far).
      geometry.scale(1, -1, -1);
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const center = new T.Vector3();
      box.getCenter(center);
      geometry.translate(-center.x, -center.y, -center.z);

      const size = box.getSize(new T.Vector3()).length();
      camera.position.set(0, 0, size * 1.2);
      camera.near = size * 0.005;
      camera.far  = size * 20;
      camera.updateProjectionMatrix();
      controls.target.set(0, 0, 0);

      const mat = new T.PointsMaterial({
        size: size * 0.003,
        sizeAttenuation: true,
        vertexColors: geometry.attributes.color ? true : false,
        color: geometry.attributes.color ? undefined : 0x44bbff,
      });
      scene.add(new T.Points(geometry, mat));

      const pts  = geometry.attributes.position.count;
      const sizeMB = ev.ply_size ? (ev.ply_size / 1e6).toFixed(1) + ' MB' : '';
      hud.textContent = pts.toLocaleString() + ' pts' + (sizeMB ? ' · ' + sizeMB : '');
    },
    undefined,
    function(err) {
      hud.textContent = 'Failed to load .ply';
      console.error('PLY load error', err);
    }
  );

  let animId;
  function animate() { animId = requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
  animate();

  const ro = new ResizeObserver(function() {
    const w = stage.clientWidth, h = stage.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });
  ro.observe(stage);

  return function() {
    cancelAnimationFrame(animId);
    controls.dispose();
    renderer.dispose();
    ro.disconnect();
  };
}

// ── Mode: XR ─────────────────────────────────────────────────────────────
async function mountXr() {
  const url = window.location.href;

  // Check XR support
  let vrOk = false, arOk = false;
  if (navigator.xr) {
    try { vrOk = await navigator.xr.isSessionSupported('immersive-vr'); } catch(_) {}
    try { arOk = await navigator.xr.isSessionSupported('immersive-ar'); } catch(_) {}
  }
  const ua = navigator.userAgent || '';
  const headset = /OculusBrowser|Quest|Pico|VisionOS|Wolvic/i.test(ua) || vrOk || arOk;

  // Simple seeded QR-like grid (same approach as design reference)
  function fauxQR(data, size) {
    const N = 25;
    let s = (data||'').split('').reduce(function(a,c){return a+c.charCodeAt(0);},0);
    function r(){ s=(s*9301+49297)%233280; return s/233280; }
    const grid = Array.from({length:N}, function() {
      return Array.from({length:N}, function(){ return r()>0.55?1:0; });
    });
    // Finder patterns
    [[0,0],[0,N-7],[N-7,0]].forEach(function(ref) {
      const ox=ref[0], oy=ref[1];
      for(let y=0;y<7;y++) for(let x=0;x<7;x++){
        grid[oy+y][ox+x]=(x===0||x===6||y===0||y===6||( x>=2&&x<=4&&y>=2&&y<=4))?1:0;
      }
    });
    const cell = (size/N).toFixed(3);
    let rects = '';
    grid.forEach(function(row,y){row.forEach(function(v,x){
      if(v) rects+=`<rect x="${(x*size/N).toFixed(2)}" y="${(y*size/N).toFixed(2)}" width="${cell}" height="${cell}"/>`;
    });});
    return `<svg viewBox="0 0 ${size} ${size}" class="xr__qrsvg" shape-rendering="crispEdges" fill="currentColor">${rects}</svg>`;
  }

  stage.innerHTML = `
    <div class="xr-wrap">
      <div class="xr">
        <div>
          <div class="xr__glyph" aria-hidden>
            <svg viewBox="0 0 120 60" width="140" height="70">
              <path d="M10 30 Q10 10 30 10 H90 Q110 10 110 30 Q110 50 90 50 H30 Q10 50 10 30 Z"
                fill="none" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="40" cy="30" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="80" cy="30" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <line x1="50" y1="30" x2="70" y2="30" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="xr__title">${headset ? 'Headset detected' : 'Open in a headset'}</div>
          <div class="xr__sub">
            ${headset
              ? 'Step into the scene &mdash; the depth map becomes a real volumetric proxy you can walk around.'
              : 'Open this URL on a Quest, Vision Pro, or Pico headset to enter the scene in immersive 3D.'}
          </div>
          <div class="xr__btns">
            <button class="btn btn--primary" id="js-xr-vr" ${!vrOk ? 'disabled' : ''}>
              ${vrOk ? 'Enter VR' : 'VR not available'}
            </button>
            <button class="btn" id="js-xr-ar" ${!arOk ? 'disabled' : ''}>
              ${arOk ? 'Enter AR (passthrough)' : 'AR not available'}
            </button>
            ${ev.has_ply ? `<a href="/events/${ev.event_id}/pointcloud.ply" class="btn btn--ghost" download>Download .ply</a>` : ''}
          </div>
          <div class="xr__support mono">
            <span>WebXR VR: <b style="color:${vrOk?'oklch(0.78 0.13 145)':'var(--fg-dim)'}">${vrOk?'available':'unavailable'}</b></span>
            <span>WebXR AR: <b style="color:${arOk?'oklch(0.78 0.13 145)':'var(--fg-dim)'}">${arOk?'available':'unavailable'}</b></span>
          </div>
        </div>
        <div class="xr__qr">
          <div class="label-xs">Scan from headset</div>
          <div class="xr__qrbox">${fauxQR(url, 156)}</div>
          <div class="xr__url mono">${url}</div>
        </div>
      </div>
    </div>`;

  // VR session handler
  const vrBtn = stage.querySelector('#js-xr-vr');
  if (vrOk && vrBtn) {
    vrBtn.onclick = async function() {
      try {
        const session = await navigator.xr.requestSession('immersive-vr');
        vrBtn.textContent = 'In VR session';
        session.addEventListener('end', function(){ vrBtn.textContent = 'Enter VR'; });
      } catch(e) {
        console.error('VR session failed', e);
      }
    };
  }
  const arBtn = stage.querySelector('#js-xr-ar');
  if (arOk && arBtn) {
    arBtn.onclick = async function() {
      try {
        const session = await navigator.xr.requestSession('immersive-ar');
        arBtn.textContent = 'In AR session';
        session.addEventListener('end', function(){ arBtn.textContent = 'Enter AR (passthrough)'; });
      } catch(e) {
        console.error('AR session failed', e);
      }
    };
  }

  return null;  // no animation loop to clean up
}

// ── Init ──────────────────────────────────────────────────────────────────
updateDock();
switchMode(mode);

// iOS Safari restores pages from BFCache on back/forward nav — scripts don't
// re-run, leaving the dock unhighlighted and stage empty. Re-mount on restore.
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    if (cleanup) { try { cleanup(); } catch(_) {} cleanup = null; }
    updateDock();
    switchMode(mode);
  }
});
</script>
