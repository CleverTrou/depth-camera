# =============================================================================
# Depth Camera Configuration
# =============================================================================
# Everything runs on the Pi. No VPS, no cloud compute.

camera:
  # RTSP URL is loaded from the environment variable CAMERA_RTSP_URL.
  # Set it in /etc/depth-camera.env (created by setup.sh):
  #   CAMERA_RTSP_URL=rtsp://USER:PASS@CAMERA_IP:8554/stream_path
  #
  # Find your Aqara G5 Pro's URL in: Aqara App → Camera → Settings → RTSP
  # This placeholder is only used if the env var is not set.
  rtsp_url: "rtsp://USER:PASS@CAMERA_IP:8554/stream_path"
  rtsp_transport: "tcp"

ring_buffer:
  # Continuous RTSP recording to circular segment files.
  # Near-zero CPU. ~8-16 MB in /tmp (RAM-backed).
  dir: "/tmp/depth-ring"
  segment_seconds: 2
  segment_count: 8           # 8 × 2s = 16 seconds of history
  stale_timeout: 15
  restart_delay: 3

relay:
  # IFTTT webhook receiver
  host: "0.0.0.0"
  port: 9090
  lookback_s: 5              # Seconds into the past for IFTTT triggers
  snapshot_quality: 2        # ffmpeg -q:v (1=best, 31=worst)

detection:
  # Local motion monitor (optional fallback)
  poll_interval: 3
  compare_width: 320
  compare_height: 240
  threshold: 20
  # Higher per-pixel threshold used only for the orange diff image visualization,
  # not for detection counting. Reduces visual noise; 0 = same as threshold.
  diff_display_threshold: 40
  min_changed_pct: 20.0      # was 5.0 pre-EWMA; EWMA p50 is now 1-4%, tune accordingly
  min_mean_diff: 12.0        # absolute pixel-intensity gate; filters lighting flicker
  cooldown: 300              # was 120; hard ceiling ~12 triggers/hour
  confirm_frames: 3          # was 2; require 9s sustained motion instead of 6s
  lookback_s: 2              # Shorter than IFTTT (local is faster)
  snapshot_quality: 2

pipeline:
  # Depth processing settings
  data_dir: "/data/depth-camera"
  max_events: 200

  # Point cloud downsampling: 1=full (~31MB), 2=quarter (~8MB), 4=sixteenth (~2MB)
  ply_downsample: 2

  # Model input resolution: 518 (default, best quality) or 384 (~40% faster)
  depth_input_size: 518

  # Depth visualization colormap: inferno, viridis, magma, turbo
  colormap: "inferno"

  # Z-axis scale for the point cloud. With the correct wide-angle FOV the scene
  # is geometrically 3x wider than deep; increase this to stretch the depth axis
  # and restore natural-looking front-to-back proportions. Try 2.5–4.0.
  ply_depth_scale: 1.5

  # Camera horizontal field of view (degrees) for point cloud projection.
  # Aqara G5 Pro: ~113° derived from 120° diagonal spec over a 16:9 sensor.
  # Incorrect FOV causes ground-plane bowing. Tune until the ground looks flat.
  camera_hfov_deg: 113.0

  # Fit the ground plane via RANSAC and rotate the cloud so it is flat.
  ply_ground_correction: true

depth_model:
  # Path to the Depth Anything V2 Small ONNX model.
  # Downloaded automatically on first run if not present.
  path: "~/.cache/depth-camera/depth_anything_v2_vits.onnx"
  # url: "https://huggingface.co/onnx-community/depth-anything-v2-small/resolve/main/onnx/model.onnx"

gallery:
  # Local web gallery
  host: "0.0.0.0"
  port: 8080
  # Optional PIN lock for the gallery (recommended — camera images are served
  # unauthenticated without it). Set a 6-character value, e.g. "482916".
  # Leave empty to disable. Change requires restarting depth-gallery.service.
  pin: ""

notifications:
  # Dead-man's-switch heartbeats. Create a check at https://healthchecks.io/
  # and paste its ping URL below. Leave empty to disable.
  #
  # ring_buffer: pinged every 60s while segments are flowing.
  #   Suggested healthchecks config: period=1m, grace=2m.
  # webhook: pinged on every incoming /ifttt POST. If Aqara detects nothing
  #   for a long time, this will go silent and alert you.
  #   Suggested healthchecks config: period=24h, grace=12h.
  ring_buffer_heartbeat_url: ""
  webhook_heartbeat_url: ""

  # Active error pushes. Pick any topic name on https://ntfy.sh/ (e.g.
  #   https://ntfy.sh/depth-camera-<random>) and subscribe to it
  # in the ntfy iPhone/Android app. Leave empty to disable.
  ntfy_topic_url: ""

logging:
  level: "INFO"
  save_debug_frames: false
  debug_dir: "/tmp/depth-monitor-debug"
